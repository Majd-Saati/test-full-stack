services:
  client:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - server

  server:
    build: ./backend
    ports:
      - "${BACKEND_PORT}:${BACKEND_INTERNAL_PORT}"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: always

  db:
    image: mysql:8
    restart: always
    env_file: .env
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data: